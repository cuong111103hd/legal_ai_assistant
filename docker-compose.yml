version: "3.9"

services:
  # ── Qdrant vector database ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL relational database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: legal_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: legal_assistant
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d legal_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ─────────────────────────────────────────────────
  app:
    build: .
    container_name: legal_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data   # Persist BM25 index
    restart: unless-stopped

  # ── Adminer (Web UI for PostgreSQL) ─────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: legal_adminer
    ports:
      - "8081:8080"
    restart: unless-stopped

  # ── Neo4j (Graph Database) ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: legal_neo4j
    ports:
      - "7474:7474"   # HTTP Web UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/legal_pass
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  postgres_data:
  app_data:
  neo4j_data:
